[package]
name = "reaction-resonance-eframe"
version = "0.1.0"
edition = "2021"

[dependencies]
eframe = { version = "0.31.0", features = ["glow", "persistence", "wayland"] }
egui = { version = "0.31.0", features = ["serde"] }
ehttp = "0.5.0"
env_logger = "0.11.6"
eventuals = "0.6.7"
futures = { version = "0.3.31", features = ["compat"] }
getrandom = { version = "0.3.3", features = ["wasm_js"] }
log = "0.4.25"
rand = "0.9.1"
rand_core = "0.9.3"
rayon = "1.10.0"
reqwest-wasm = { version = "0.11.16", features = ["blocking"] }
serde = { version = "1.0.217", features = ["derive"] }
serde_json = "1.0.140"
tokio = { version = "1.47.0", features = ["sync"] }
wasm-bindgen = "0.2.100"
wasm-bindgen-futures = "0.4.50"
web-sys = { version = "0.3.77", features = ["Element", "Document", "Window", "OrientationLockType", "Screen", "ScreenOrientation", "RequestInit", "Request", "Headers", "ReferrerPolicy"] }
wide = "0.7.33"
xorshift = "0.1.3"

[profile.release]
opt-level = 's'
# 20-30 fps improvement - long compile time
#lto = true
codegen-units = 1
